<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/cortex-logo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Cortex Workmate</title>
    <!-- Apply the persisted theme before first paint so dark/system-dark users don't flash light. -->
    <script>
      try {
        var s = (JSON.parse(localStorage.getItem('cortex-workmate-v1') || '{}').state) || {}
        var m = s.themeMode || s.theme || 'light'
        var dark = m === 'dark' || (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
